<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Place</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    body {
      background: #f5f7fa;
      font-family: 'Segoe UI', sans-serif;
      padding: 20px;
    }
    .form-container {
      max-width: 700px;
      margin: 40px auto;
      background: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }
    .form-header {
      text-align: center;
      margin-bottom: 30px;
    }
    .form-header h2 {
      color: #2c3e50;
    }
    .form-header p {
      color: #7f8c8d;
    }
    .form-label {
      font-weight: 600;
      color: #2c3e50;
      margin-bottom: 8px;
    }
    .submit-btn {
      background-color: #3498db;
      color: white;
      border: none;
      padding: 12px 30px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 16px;
      width: 100%;
    }
    .submit-btn:hover {
      background-color: #1abc9c;
    }
  </style>
</head>

<body>

<div class="form-container">
  <div class="form-header">
    <h2><i class="fas fa-edit"></i> Edit Place</h2>
    <p>Update place details manually</p>
  </div>

  <form method="post" action="/myapp/editplace_post/" novalidate>
    {% csrf_token %}
    <input type="hidden" name="id" value="{{ data.id }}">

    <!-- Bus Stop -->
    <div class="mb-3">
      <label class="form-label"><i class="fas fa-bus-stop"></i> Bus Stop</label>
      <select name="stop" class="form-select" required>
        <option value="">-- Select a Bus Stop --</option>
        {% for i in st %}
          <option value="{{ i.id }}" {% if i.id == data.stop_id %}selected{% endif %}>
            {{ i.stopname }}
          </option>
        {% endfor %}
      </select>
    </div>

    <!-- Place Name -->
    <div class="mb-3">
      <label class="form-label"><i class="fas fa-map-pin"></i> Place Name</label>
      <input type="text" name="placename" class="form-control"
             value="{{ data.placename }}"
             pattern="[A-Za-z0-9\s,.-]{3,100}"
             title="3–100 characters (letters, numbers, comma allowed)"
             required>
    </div>

    <!-- Latitude & Longitude -->
    <div class="row mb-3">
      <div class="col-md-6">
        <label class="form-label"><i class="fas fa-globe-asia"></i> Latitude</label>
        <input type="number" step="any" name="latitude" class="form-control"
               value="{{ data.latitude }}"
               min="-90" max="90"
               title="Latitude must be between -90 and 90"
               required>
      </div>

      <div class="col-md-6">
        <label class="form-label"><i class="fas fa-globe-asia"></i> Longitude</label>
        <input type="number" step="any" name="longitude" class="form-control"
               value="{{ data.longitude }}"
               min="-180" max="180"
               title="Longitude must be between -180 and 180"
               required>
      </div>
    </div>

    <!-- Place Type -->
    <div class="mb-3">
      <label class="form-label"><i class="fas fa-tag"></i> Place Type</label>
      <input type="text" name="placetype" class="form-control"
             value="{{ data.placetype }}"
             pattern="[A-Za-z\s]{3,30}"
             title="Only letters allowed (3–30 characters)"
             required>
    </div>


    <button type="submit" class="submit-btn">
      <i class="fas fa-save"></i> Update Place
    </button>
  </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
