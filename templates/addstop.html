{% include 'adminheader.html' %}
<br><br><br><br>
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Stop</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { font-family: 'Segoe UI', sans-serif; background: #f5f7fa; padding: 20px; }
    .form-container { max-width: 600px; margin: 40px auto; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 15px 40px rgba(0,0,0,0.1); }
  </style>
</head>
<body>
  <div class="form-container">
    <h2><i class="fas fa-map-marker-alt"></i> Add New Stop</h2>
    <p>Enter stop details below</p>

    <form action="/myapp/addstop_post/" method="post">
      {% csrf_token %}

      <!-- Route Selection -->
      <div class="mb-3">
        <label class="form-label"><i class="fas fa-bus"></i> Select Route</label>
        <select name="route" class="form-control" required>
          <option value="">-- Select a Route --</option>
          {% for i in data %}
            <option value="{{ i.id }}">
              {{ i.from_destination }} → {{ i.to_destination }}
            </option>
          {% endfor %}
        </select>
      </div>

      <!-- Stop Name Input -->
      <div class="mb-3">
        <label class="form-label"><i class="fas fa-map-pin"></i> Stop Name</label>
        <input type="text" class="form-control" name="stopname" placeholder="Enter stop name" required>
      </div>

      <!-- Manual Coordinates Input -->


      <button type="submit" class="btn btn-success"><i class="fas fa-plus-circle"></i> Add Stop</button>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
{% include 'adminfooter.html' %}
