<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Route (Manual)</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            background: #f8f9fa;
            font-family: 'Segoe UI', sans-serif;
            padding: 20px;
        }

        .container-custom {
            max-width: 700px;
            margin: 40px auto;
            background: white;
            padding: 35px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .page-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .page-header h2 {
            color: #2c3e50;
            font-weight: 700;
        }

        .form-section {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 25px;
            border-left: 4px solid #1abc9c;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #2c3e50;
        }

        .form-label {
            font-weight: 600;
            margin-bottom: 6px;
        }

        .form-control {
            border-radius: 10px;
            padding: 12px;
        }

        .location-preview {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .location-card {
            flex: 1;
            background: white;
            padding: 15px;
            border-radius: 10px;
            border: 2px solid #e0e6ed;
        }

        .location-card strong {
            display: block;
            margin-bottom: 5px;
        }

        .btn-submit {
            background: linear-gradient(135deg, #1abc9c, #16a085);
            color: #fff;
            border: none;
            padding: 14px 40px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            display: block;
            margin: 30px auto 0;
        }

        .btn-submit:hover {
            background: #16a085;
        }
    </style>
</head>

<body>
<div class="container-custom">
    <div class="page-header">
        <h2><i class="fas fa-route"></i> Edit Route (Manual)</h2>
        <p class="text-muted">Enter route details manually</p>
    </div>

    <form method="post" action="/myapp/editroute_post/" id="routeForm">
        {% csrf_token %}
        <input type="hidden" name="id" value="{{ data.id }}">

        <!-- Preview Cards -->
        <div class="location-preview">
            <div class="location-card">
                <strong>From:</strong>
                <div id="fromPreview">{{ data.from_destination }}</div>
            </div>
            <div class="location-card">
                <strong>To:</strong>
                <div id="toPreview">{{ data.to_destination }}</div>
            </div>
        </div>

        <!-- Locations Section -->
        <div class="form-section">
            <div class="section-title"><i class="fas fa-map-marked-alt"></i> Route Locations</div>

            <div class="mb-3">
                <label class="form-label"><i class="fas fa-play-circle"></i> From Destination</label>
                <input type="text" class="form-control" id="from_destination"
                       name="from_destination" value="{{ data.from_destination }}" required>
            </div>

            <div class="mb-3">
                <label class="form-label"><i class="fas fa-stop-circle"></i> To Destination</label>
                <input type="text" class="form-control" id="to_destination"
                       name="to_destination" value="{{ data.to_destination }}" required>
            </div>
        </div>

        <!-- Coordinates Section -->
        <div class="form-section">
            <div class="section-title"><i class="fas fa-globe"></i> Coordinates</div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label"><i class="fas fa-latitude"></i> Latitude</label>
                    <input type="text" class="form-control" name="latitude"
                           value="{{ data.latitude }}" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label"><i class="fas fa-longitude"></i> Longitude</label>
                    <input type="text" class="form-control" name="longitude"
                           value="{{ data.longititude }}" required>
                </div>
            </div>
        </div>

        <button type="submit" class="btn-submit"><i class="fas fa-save"></i> Update Route</button>
    </form>
</div>
</body>
</html>

{% include 'adminfooter.html' %}
