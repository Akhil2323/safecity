<!DOCTYPE html>
<br><br><br><br>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SafeCity Login</title>

  <!-- Bootstrap CSS -->
  <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
    }

    .login-card {
      background: #fff;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    .login-card h2 {
      font-weight: 700;
      margin-bottom: 20px;
      color: #203a43;
    }

    .btn-login {
      background-color: #203a43;
      color: #fff;
    }

    .btn-login:hover {
      background-color: #0f2027;
    }

    .btn-home {
      border: 1px solid #203a43;
      color: #203a43;
    }

    .btn-home:hover {
      background-color: #203a43;
      color: #fff;
    }
  </style>
</head>

<body>

<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
      <div class="login-card">

        <h2 class="text-center">SafeCity Login</h2>

        <form action="/myapp/login_post/" method="post">
          {% csrf_token %}

          <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" class="form-control" placeholder="Enter username" required>
          </div>

          <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" class="form-control" placeholder="Enter password" required>
          </div>

          <button type="submit" class="btn btn-login btn-block mt-3">
            Login
          </button>
        </form>

        <div class="text-center mt-3">
          <a href="#" class="text-muted">Forgot Password?</a>
        </div>

        <hr>

        <!-- RETURN TO HOME BUTTON -->
        <a href="/myapp/" class="btn btn-home btn-block">
          ← Return to Home
        </a>

      </div>
    </div>
  </div>
</div>

<!-- JS -->
<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

</body>
</html>
